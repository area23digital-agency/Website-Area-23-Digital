    <style>
      body {
        background-color: #000000;
        color: #ffffff;
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      /* Transitions */
      .transition-all-300 { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

      /* Hero Floating Shapes */
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
      }

      /* Subtle Animated Mesh Background */
      .bg-mesh {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .mesh-blob {
        position: absolute;
        border-radius: 100%;
        filter: blur(120px);
        opacity: 0.1;
        mix-blend-mode: screen;
        animation: meshMove 30s infinite alternate ease-in-out;
      }

      @keyframes meshMove {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(15%, 5%) rotate(10deg) scale(1.1); }
        66% { transform: translate(-5%, 15%) rotate(-5deg) scale(0.9); }
        100% { transform: translate(10%, -5%) rotate(5deg) scale(1.05); }
      }

      /* Moving Grid */
      .bg-grid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: -2;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
        animation: gridMove 60s linear infinite;
      }

      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 60px 60px; }
      }

      /* Noise Grain */
      .bg-grain::after {
        content: "";
        position: fixed;
        top: -100%;
        left: -100%;
        width: 300%;
        height: 300%;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.05;
        pointer-events: none;
        z-index: 100;
        animation: noise 1s steps(2) infinite;
      }

      @keyframes noise {
        0% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -5%); }
        20% { transform: translate(-10%, 5%); }
        30% { transform: translate(5%, -10%); }
        40% { transform: translate(-5%, 15%); }
        50% { transform: translate(-10%, 5%); }
        60% { transform: translate(15%, 0); }
        70% { transform: translate(0, 10%); }
        80% { transform: translate(-15%, 0); }
        90% { transform: translate(10%, 5%); }
        100% { transform: translate(5%, 0); }
      }

      /* --- GLOBAL HERO ANIMATIONS --- */
      @keyframes reveal {
        0% { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(10px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      @keyframes fadeSlideDown {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeSlideUp {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes animatedgradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Animation Utility Classes */
      /* Updated to use 'both' fill-mode to ensure initial state is handled by keyframes, removing need for opacity-0 class */
      .animate-reveal { animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; will-change: transform, opacity; }
      .animate-fadeSlideDown { animation: fadeSlideDown 0.8s ease-out both; will-change: transform, opacity; }
      .animate-fadeSlideUp { animation: fadeSlideUp 0.8s ease-out both; will-change: transform, opacity; }
      .animate-fadeIn { animation: fadeIn 0.8s ease-out both; will-change: opacity; }
      .animate-gradient { animation: animatedgradient 6s ease infinite alternate; }

      /* Border Rotate Animation */
      @keyframes borderRotate {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Glow Animation */
      @keyframes glow {
        0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 69, 0.4); }
        50% { box-shadow: 0 0 60px rgba(255, 0, 69, 0.6); }
      }

      /* Shine Animation */
      @keyframes shine {
        0% { left: -100%; top: -100%; }
        100% { left: 100%; top: 100%; }
      }

      /* Shake Animation */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }

      /* PopIn Animation */
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0) rotate(-180deg); }
        60% { opacity: 1; transform: scale(1.2) rotate(10deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      /* Final CTA Waves */
      @keyframes wave {
        0% { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(50px, 50px) rotate(360deg); }
      }

      /* Pulse */
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes badgePulse {
        0%, 100% { box-shadow: 0 8px 32px rgba(255,0,69,0.5); transform: translate(-50%, -50%) scale(1); }
        50% { box-shadow: 0 12px 48px rgba(255,0,69,0.7); transform: translate(-50%, -50%) scale(1.05); }
      }

      ::selection { background-color: #ff0045; color: white; }
    </style>
