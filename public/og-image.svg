<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <!-- Red glow -->
    <radialGradient id="glow1" cx="25%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ff0045;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ff0045;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" style="stop-color:#ff0045;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#ff0045;stop-opacity:0" />
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <!-- Clip -->
    <clipPath id="clip">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base background -->
    <rect width="1200" height="630" fill="url(#bg)" />
    <!-- Grid -->
    <rect width="1200" height="630" fill="url(#grid)" />
    <!-- Glow blobs -->
    <rect width="1200" height="630" fill="url(#glow1)" />
    <rect width="1200" height="630" fill="url(#glow2)" />

    <!-- Top border accent line -->
    <rect x="0" y="0" width="1200" height="2" fill="#ff0045" opacity="0.8"/>

    <!-- Left accent line -->
    <rect x="80" y="60" width="3" height="510" rx="2" fill="#ff0045" opacity="0.5"/>

    <!-- Badge -->
    <rect x="80" y="80" width="260" height="32" rx="16" fill="rgba(255,0,69,0.1)" stroke="rgba(255,0,69,0.35)" stroke-width="1"/>
    <circle cx="104" cy="96" r="5" fill="#ff0045" opacity="0.9"/>
    <text x="120" y="101" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="rgba(255,255,255,0.7)" text-transform="uppercase">GROWTH SYSTEMS AGENCY</text>

    <!-- Main headline -->
    <text x="80" y="200" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Area 23 Digital</text>

    <!-- Subheadline -->
    <text x="80" y="265" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.55)">We build growth systems, not campaigns.</text>

    <!-- Divider -->
    <rect x="80" y="305" width="520" height="1" fill="rgba(255,255,255,0.08)"/>

    <!-- Service pills row -->
    <!-- Pill 1: Paid Media -->
    <rect x="80" y="325" width="130" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="145" y="348" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Paid Media</text>
    <!-- Pill 2: Automation -->
    <rect x="222" y="325" width="140" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="292" y="348" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Automation</text>
    <!-- Pill 3: Strategy -->
    <rect x="374" y="325" width="120" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="434" y="348" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Strategy</text>
    <!-- Pill 4: Web & CRO -->
    <rect x="506" y="325" width="120" height="36" rx="18" fill="rgba(255,0,69,0.12)" stroke="rgba(255,0,69,0.3)" stroke-width="1"/>
    <text x="566" y="348" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#ff6680" text-anchor="middle">Web &amp; CRO</text>

    <!-- Stats row -->
    <text x="80" y="435" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="36" font-weight="900" fill="#ff0045">50+</text>
    <text x="80" y="465" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">BUSINESSES SCALED</text>

    <rect x="200" y="420" width="1" height="55" fill="rgba(255,255,255,0.1)"/>

    <text x="222" y="435" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="36" font-weight="900" fill="#ff0045">$2M+</text>
    <text x="222" y="465" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">AD SPEND MANAGED</text>

    <rect x="390" y="420" width="1" height="55" fill="rgba(255,255,255,0.1)"/>

    <text x="412" y="435" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="36" font-weight="900" fill="#ff0045">3x</text>
    <text x="412" y="465" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">AVG. REVENUE GROWTH</text>

    <!-- URL / domain -->
    <text x="80" y="565" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.25)" letter-spacing="1">area23digital.com</text>

    <!-- Right side: abstract system diagram -->
    <g opacity="0.6">
      <!-- Central node -->
      <circle cx="960" cy="315" r="70" fill="rgba(255,0,69,0.06)" stroke="rgba(255,0,69,0.25)" stroke-width="1.5"/>
      <circle cx="960" cy="315" r="40" fill="rgba(255,0,69,0.08)" stroke="rgba(255,0,69,0.4)" stroke-width="1"/>
      <text x="960" y="308" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="10" font-weight="800" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1.5">GROWTH</text>
      <text x="960" y="323" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="10" font-weight="800" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1.5">SYSTEM</text>

      <!-- Satellite nodes -->
      <!-- Top -->
      <line x1="960" y1="245" x2="960" y2="200" stroke="rgba(255,0,69,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
      <circle cx="960" cy="185" r="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="960" y="189" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">STRATEGY</text>

      <!-- Right -->
      <line x1="1030" y1="315" x2="1075" y2="315" stroke="rgba(255,0,69,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
      <circle cx="1095" cy="315" r="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="1095" y="319" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">ADS</text>

      <!-- Bottom -->
      <line x1="960" y1="385" x2="960" y2="430" stroke="rgba(255,0,69,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
      <circle cx="960" cy="447" r="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="960" y="451" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">CRM</text>

      <!-- Left -->
      <line x1="890" y1="315" x2="845" y2="315" stroke="rgba(255,0,69,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
      <circle cx="825" cy="315" r="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <text x="825" y="319" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">WEB</text>
    </g>

    <!-- Bottom border -->
    <rect x="0" y="628" width="1200" height="2" fill="rgba(255,0,69,0.3)"/>
  </g>
</svg>
